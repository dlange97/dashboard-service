security:
  providers:
    jwt:
      lexik_jwt:
        class: MyDashboard\Shared\Security\JwtUser

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    health:
      pattern: ^/dashboard/health$
      security: false

    api:
      pattern: ^/dashboard/
      stateless: true
      provider: jwt
      jwt: ~

  access_control:
    - { path: ^/dashboard/health, roles: PUBLIC_ACCESS }
    - { path: ^/dashboard/docs(?:\.json)?$, roles: PUBLIC_ACCESS }
    - {
        path: ^/dashboard/todos,
        methods: [GET],
        allow_if: "user and 'todos.view' in user.getPermissions()",
      }
    - {
        path: ^/dashboard/todos,
        methods: [POST, PATCH, PUT, DELETE],
        allow_if: "user and 'todos.manage' in user.getPermissions()",
      }
    - {
        path: ^/dashboard/shopping-lists,
        methods: [GET],
        allow_if: "user and 'shopping.view' in user.getPermissions()",
      }
    - {
        path: ^/dashboard/shopping-lists,
        methods: [POST, PATCH, PUT, DELETE],
        allow_if: "user and 'shopping.manage' in user.getPermissions()",
      }
    - { path: ^/dashboard/, roles: ROLE_USER }
